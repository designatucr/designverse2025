name: Sync Changes from Template
on: workflow_dispatch
  # schedule:
  #   # Run at 6:00 AM every day
  #   - cron: "0 14 * * *"

jobs:
  sync-from-template:
    # don't run this job on the template
    if: github.repository != 'acm-ucr/hackathon-website'
    name: Sync changes from acm-ucr/hackathon-website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v4
        with:
          path: ${{ github.repository }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "Github Actions Bot"
          git config --global user.email "actions@github.com"
          git config --global pull.rebase false

      - name: Fetch all
        working-directory: ${{ github.repository }}
        run: |
          git remote add template https://github.com/acm-ucr/hackathon-website
          git fetch --all

      - name: Checkout and push Template Dev Branch
        working-directory: ${{ github.repository }}
        run: |
          branch_exists=$(git branch --list --remote | { grep -F "origin/sync-template" || true; } )
          if [ -z "$branch_exists" ]
          then
            git checkout -b sync-template
            git pull https://github.com/acm-ucr/hackathon-website.git --allow-unrelated-histories --squash --strategy=recursive -X theirs
            git add .
            git commit -m "chore: syncing template changes"
            git push --set-upstream origin sync-template
            gh pr create --base dev --title "Sync Template Changes" --body "Syncing template changes"
          else
            git checkout -b sync-template origin/sync-template
            git pull template dev
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
